<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Encurtador de URLs</title>
</head>

<body>
    <h1>Encurtador de URLs</h1>
    <input id="url" type="url" placeholder="https://exemplo.com/...">
    <button id="btn">Encurtar</button>
    <div id="resultado"></div>
    <h2>URLs cadastradas</h2>
    <table id="tabela">
        <thead>
            <tr>
                <th>Código</th>
                <th>Original</th>
                <th>Acessos</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="app.js"></script>
</body>

</html>
