<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
</head>

<body class="d-flex flex-column min-vh-100 justify-content-center align-items-center">

    <div class="card">
        <div class="card-header">
            <h1 class="display-6">Bem-vindo(a) de volta!</h1>
        </div>
        <form action="/entrar" method="post">
            <div class="card-body">
                <div class="form-floating mb-3">
                    <input type="email" name="email" id="email" class="form-control" placeholder="" required>
                    <label for="email">E-mail</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" name="senha" id="senha" class="form-control" placeholder="" required>
                    <label for="senha">Senha</label>
                </div>
            </div>
            <div class="card-footer">
                <div class="my-2">
                    <button class="btn btn-primary w-100" type="submit">Entrar</button>
                </div>
                <div class="form-check form-switch mb-2 small form-text">
                    <input type="checkbox" name="lembrar" id="lembrar" class="form-check-input">
                    <label for="lembrar" class="form-check-label">
                        Lembrar-me
                    </label>
                </div>
                <div class="form-text mb-2 small">
                    Não tem uma conta? <a href="/cadastrar">Cadastre-se</a>
                </div>
                <div class="form-text small">
                    Esqueceu sua senha? <a href="/recuperar-senha">Recupere aqui</a>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
