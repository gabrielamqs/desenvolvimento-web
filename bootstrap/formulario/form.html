<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="d-flex flex-column min-vh-100 justify-content-center align-items-center"
  >
    <div class="card col-md-6">
      <div class="card-body">
        <form action="/chamado" method="post">
          <div class="form-floating mb-3">
            <input
              type="assunto"
              name="assunto"
              class="form-select"
              id="assunto"
              placeholder=""
              required
            />
            <label for="assunto">Assunto</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="nome"
              name="nome"
              class="form-control"
              id="nome"
              placeholder=""
              required
            />
            <label for="nome">Nome Completo</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="email"
              name="email"
              class="form-control"
              id="email"
              placeholder=""
              required
            />
            <label for="email">E-mail</label>
          </div>
          <div class="row g-3">
            <div class="col md-6 form-floating mb-3">
              <input
                type="tel"
                name="telefone"
                class="form-control"
                id="telefone"
                placeholder=""
                required
              />
              <label for="telefone">Telefone</label>
            </div>
            <div class="col md-6 form-floating mb-3"">
              <input
              type="date"
              name="data"
              class="form-control"
              id="data"
              placeholder=""
              required
            />
            <label for="data">Data de Ocorrência</label>
            </div>
          </div>
          <div class="row">
            <div class="col">
              <button type="submit" class="btn btn-primary rounded-0 p-2">
                Abrir Chamado
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
