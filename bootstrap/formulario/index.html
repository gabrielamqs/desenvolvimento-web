<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="d-flex flex-column min-vh-100 justify-content-center align-items-center"
  >
    <div class="card">
      <div class="card-header">
        <h1 class="display-8">Bem vindo de volta!</h1>
      </div>
      <div class="card-body">
        <form action="/chamado" method="post">
          <div class="form-floating mb-3">
            <input
              type="email"
              name="email"
              class="form-control"
              id="email"
              placeholder=""
              required
            />
            <label for="email">Email</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="password"
              name="senha"
              class="form-control"
              id="senha"
              placeholder=""
              required
            />
            <label for="senha">Senha</label>
          </div>
          <div class="row">
            <div class="col">
              <div class="form-check form-switch">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="lembrar"
                  name="lembrar"
                />
                <label for="lembrar" class="form-check-label"
                  >Lembre de mim</label
                >
              </div>
            </div>
            <div class="col">
              <button type="submit" class="btn btn-primary w-100">
                Entrar
              </button>
            </div>
            <div class="col">
              <div class="form-text mb-2 small">
                Não tem uma conta? <a href="/cadastrar">Cadastre-se</a>
              </div>
              <div class="form-text small">
                Esqueceu sua senha?<a href="/recuperar-senha"
                  >Recuperar senha</a
                >
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
