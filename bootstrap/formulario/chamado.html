<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Abertura de Chamado</title>
</head>

<body class="bg-light d-flex justify-content-center flex-column align-items-center min-vh-100">

    <form action="/chamado" method="post">
        <div class="d-flex flex-column gap-3 border p-4 rounded bg-white shadow">
            <h1 class="text-center">Abertura de Chamado</h1>
            <div class="input-group input-group-lg">
                <span class="input-group-text rounded-start-pill"><i class="bi bi-tag"></i></span>
                <select class="form-select rounded-end-pill" aria-label="Assunto">
                    <option selected disabled>Assunto</option>
                    <option value="1">Suporte Técnico</option>
                    <option value="2">Financeiro</option>
                    <option value="3">Outros</option>
                </select>
            </div>
            <div class="input-group input-group-lg">
                <span class="input-group-text rounded-start-pill"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control rounded-end-pill" placeholder="Nome Completo">
            </div>
            <div class="input-group input-group-lg">
                <span class="input-group-text rounded-start-pill"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control rounded-end-pill" placeholder="E-mail">
            </div>
            <div class="row g-3">
                <div class="col-6">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text rounded-start-pill"><i class="bi bi-telephone"></i></span>
                        <input type="tel" class="form-control rounded-end-pill" placeholder="Telefone">
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text rounded-start-pill"><i class="bi bi-calendar-event"></i></span>
                        <input type="date" class="form-control rounded-end-pill" placeholder="Data da Ocorrência">
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-primary btn-lg rounded-pill mt-2 px-5 align-self-start">Abrir
                Chamado</button>
        </div>
    </form>
</body>

</html>
